name: farmers_market_platform_frontend_flutter
description: "Application POS mobile pour marché agricole — XpertBot."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  connectivity_plus: ^7.1.1
  go_router: ^17.2.2
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/icon_application.png"
    background_color: "#1B5E20"
    theme_color: "#1B5E20"
  image_path: "assets/images/icon_application.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
